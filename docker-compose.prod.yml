services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - chroma_data:/app/chroma_db
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""   # vacío = URLs relativas, nginx hace el proxy
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chroma_data:
