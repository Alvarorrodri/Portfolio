services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - chroma_data:/app/chroma_db
      - sqlite_data:/app/data
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - caddy_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - caddy_network

volumes:
  chroma_data:
  sqlite_data:

networks:
  caddy_network:
    external: true